---
layout: default
---
<div class="main-content">
  <div class="container">
    <div class="home-container">
      <div class="profile-image">
        <img src="{{ '/assets/img/pfp.jpg' | relative_url }}" alt="{{ site.title }}" />
      </div>
      
      <div class="content">
        <h1>{{ site.title }}</h1>
        <p class="chinese-name">张恩岩</p>
        
        <div class="social-links">
          {% if site.author.github %}
            <a href="https://github.com/{{ site.author.github }}" target="_blank" class="social-icon" title="GitHub">
              <img src="{{ '/assets/img/github-mark-white.png' | relative_url }}" alt="GitHub" />
            </a>
          {% endif %}
          
          <a href="https://www.linkedin.com/in/luke-zhang-797875212/" target="_blank" class="social-icon" title="LinkedIn">
            <img src="{{ '/assets/img/LinkedIn_icon.png' | relative_url }}" alt="LinkedIn" />
          </a>
          
          <a href="mailto:enyan_zhang1@brown.edu" class="social-icon email-icon" title="Email">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
          </a>
        </div>
        
        <div class="intro">
          {{ content }}
        </div>

        <div class="links">
        </div>
      </div>
    </div>

    {% if site.posts.size > 0 %}
      <h2>Latest posts</h2>
      <ul class="post-list">
        {% for post in site.posts limit:5 %}
          <li>
            <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
            <small>· {{ post.date | date: "%b %d, %Y" }}</small>
          </li>
        {% endfor %}
      </ul>
    {% endif %}
  </div>
</div>
