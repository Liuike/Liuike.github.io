# Edit this file to update the subdomain page content.
# Add new questions by appending to `questions`, and add new narratives
# by appending to each question's `responses` list.
# Each response should include a short `preview` sentence that stays visible
# before the full narrative is expanded.
# Use `university`, `graduation_year`, and `intended_majors` for the response header.
# Set `endorsed: true` on responses that should always appear in the four-response preview.
# Separate intro paragraphs with blank lines.

title: College Application Narratives
intro: |
  This project aims to answer some common and uncommon questions about college admissions using personal narratives from college students who have been through this journey.

  These responses are intentionally personal. We hope to provide more than facts and anecdotes you can hear everywhere. Here, you can hear factual, but maybe not so exciting, stories, to guide your college application journey.

  Remember, these stories don't reflect "the way" to apply to colleges. I quote one of the respondents here: "having gone through the [college application] process" doesn't mean [college students] actually know how it works.
  Nonetheless, we hope this project can be of use for you in your application journey.

main_site_label: "Back to main site"
questions:
  - id: choose-where-to-apply
    prompt: How do you choose where to apply?
    responses:
      - university: Brown University
        graduation_year: 2028
        intended_majors: APMA-CS; pre-med
        endorsed: false
        preview: I had a list of 'safety', 'target', and 'reach' schools.
        text: >
          I followed the standard suggestion I heard, which is to have a set of "safety", "target", and "reach" schools. I didn't have many other
          factors that influenced where I applied. I applied to my state's public colleges for safety; schools with strong STEM programs as target schools;
          and top 20s for reach schools. I also applied to the UC schools.
      - university: Brown University
        graduation_year: 2028
        intended_majors: Sociology; Math
        endorsed: false
        preview: I factored in application difficulty vs. time spent...
        text: >
          I'm based in California, so naturally, I applied to the UC schools. As far as other schools, I factored in application difficulty vs. time spent
          on application when creating my list of "safety", "target", and "reach" schools. Also specifically, I toured Harvard and felt the vibes were off, so I didn't apply
          there.
      - university: Amherst College
        graduation_year: 2029
        intended_majors: Philosophy
        endorsed: false
        preview: I made a big list, then did research on if there's anything off-putting.
        text: >
          My process was very vibes based. I made a list of 40 schools, of which I could imagine myself being in. Then I did research on if any of the schools
          had anything off-putting. Some of my reasons of putting a school in my list are location and strength in a subject I'm interested in.
      - university: University of Pittsburgh
        graduation_year: 2028
        intended_majors: Computer Science
        endorsed: false
        preview: I applied to in-state universities because of tuition, and also reach schools strong in CS.
        text: >
          I mostly thought of applying to in-state universities because of in-state tuition. After that, I went for reach schools that were strong in the CS
          department, like MIT, Stanford and such. 
      - university: University of Richmond
        graduation_year: 2029
        intended_majors: Undecided
        endorsed: false
        preview: I focused on in-state schools because of strong aid for low-income Virginia residents.
        text: >
          I'm from Virginia, and I mostly looked at in-state schools because Virginia schools have pretty good aid for low-income here. I think at University of Richmond, 
          Virginia residents with income under $75,000 can get a full ride. And this was a primary motivation behind my choices.
      - university: Carnegie Mellon University
        graduation_year: 2030
        intended_majors: Visual Arts
        endorsed: false
        preview: Student culture and school size were my biggest factors.
        text: >
          I value student culture in a college the most, and I also like bigger schools. And those were the primary influences when I chose my schools.
      - university: University of Pittsburgh
        graduation_year: 2028
        intended_majors: Political Science; Philosophy; Law; Criminal Justice; and Society
        endorsed: false
        preview: I had a healthy mix of safety, target, and reach schools based on my GPA and preferences.
        text: > 
          I had a healthy mix of safety, target, and reach schools. But I also based my choices on my GPA and preferences. I also didn't apply
          to many Ivy Leagues because they didn't fit my vibe. 
      - university: University of Michigan
        graduation_year: 2028
        intended_majors: Mechanical Engineering; Math minor
        endorsed: false
        preview: I chose schools based on family guidance and engineering program strength.
        text: > 
          The places I chose were based on my family's vision of what colleges I need to go to. I also applied for specific programs that were very
          good for engineering. I'd say the influence between parental guidance and program strength was half-and-half.

