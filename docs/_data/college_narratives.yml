  - id: frame-application
    prompt: How did you frame your application?
    responses:
      - university: Brown University
        graduation_year: 2028
        intended_majors: APMA-CS; pre-med
        endorsed: false
        preview: Biomedical engineer interested in natural sciences.
        text: >
          I had plenty of olympiad experiences during high school, such as in computer science, math, and biology,
          so I mainly centered my application around those. I also included chess as my main hobby outside of academics, but that was about it.
          I would say I presented myself as a biomedical engineer who was interested in natural sciences.
      - university: Brown University
        graduation_year: 2028
        intended_majors: Sociology; Math
        endorsed: false
        preview: Someone who cares about other people and the broader society.
        text: >
          I presented myself as someone who cares about other people and the broader society. I focused on my observations about things that were going
          on around me in detail and engaged with them on a deeper level.
      - university: Amherst College
        graduation_year: 2029
        intended_majors: Philosophy
        endorsed: true
        preview: An application is a fiction based on reality.
        text: >
          I think an application is not nonfiction. It's fiction based on reality. In that regard, if you want to make a character memorable, you have
          to give them backstories that are tragic or funny. Which is why I chose a tragic and funny one. I wanted to be seen as a nerd, but for good reasons, not
          because I want to go to some university, but because I'm somehow born and disposed to being that way.
      - university: University of Pittsburgh
        graduation_year: 2028
        intended_majors: Computer Science
        endorsed: false
        preview: I framed my application around my passion for math and CS.
        text: >
          I was really interested in math and CS stuff, so I tried to frame it around my passion for math and CS. In hindsight though, I think I
          probably should've knit some of my other activities in that would differentiate me from the crowd. 
      - university: Carnegie Mellon University
        graduation_year: 2030
        intended_majors: Visual Arts
        endorsed: false
        preview: I tried to show that I valued community.
        text: >
          I really valued community, and I wanted colleges to know that. I've really tried to show that point through my personal statement and 
          extracurriculars. Also, for my art portfolio, I also made sure that messages related to humility and empathy get across. 
      - university: Brown University
        graduation_year: 2027
        intended_majors: IAPA; Classics; Archaeology
        endorsed: false
        preview: I wanted every part of my application to match a bigger story.
        text: >
          I wanted to present myself in two ways: who I am, and where I am going. And I was really concerned with every part of the application matching
          up with a bigger story that's authentic to myself. I think people sometimes get scared thinking that another person's on the other side, but as weird as 
          this may sound, the admissions officer knows you're still a kid, so I took advantage of that to have some fun. 
      - university: University of Pittsburgh
        graduation_year: 2028
        intended_majors: Political Science; Philosophy; Law; Criminal Justice; and Society
        endorsed: false
        preview: I presented my niche through political participation and youth organization work.
        text: > 
          An important thing for me was presenting myself as a sort of a niche thing. It's not just about having a strong application in terms of 
          standardized tests and grades, but also in ways you engage your society and community as a whole. In my application, I really emphasized
