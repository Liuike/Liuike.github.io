        graduation_year: 2028
        intended_majors: Mechanical Engineering; Math minor
        endorsed: false
        preview: I started researching in 9th grade and kept building my application throughout high school.
        text: > 
          The first time I knew about colleges was in 6th grade. But since my parents never attended college, it remained just an early idea for me. 
          I really started doing research about college applications in 9th grade. In 10th grade, I started writing my personal statement. I also realized I 
          wasn't doing anything outside of classes, so I started doing some extracurriculars as well. In 11th grade, I really honed in on my extracurriculars
          and applied for programs colleges offer. When 12th grade rolled around, I asked my teachers to read through my essays and finalized my application. 

